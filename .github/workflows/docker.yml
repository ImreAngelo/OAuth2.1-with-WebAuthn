name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "src/auth-server/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image prefix
        run: |
          echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV  

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Authorization Server ──────────────────────────────────────────────

      - name: Extract metadata for auth-server
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/auth-server
          tags: |
            # Tag with the git SHA for traceability
            type=sha,prefix=sha-
            # Tag branch name
            type=ref,event=branch
            # Always move "latest" on main branch pushes
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push auth-server
        uses: docker/build-push-action@v5
        with:
          context: ./src/auth-server
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          labels: ${{ steps.meta-auth.outputs.labels }}
          # Cache layers between runs using the registry itself
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/auth-server:cache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/auth-server:cache,mode=max