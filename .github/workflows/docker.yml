name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "containers/authorization-server/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image prefix
        run: |
          echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV  

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Authorization Server ──────────────────────────────────────────────
      # Backend
      # - name: Extract metadata for auth-server
      #   id: meta-auth
      #   uses: docker/metadata-action@v5
      #   with:
      #     images: ${{ env.IMAGE_PREFIX }}/auth-server
      #     tags: |
      #       # Tag with the git SHA for traceability
      #       type=sha,prefix=sha-
      #       # Tag branch name
      #       type=ref,event=branch
      #       # Always move "latest" on main branch pushes
      #       type=raw,value=latest,enable={{is_default_branch}}

      # - name: Build and push auth-server
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./containers/authorization-server
      #     push: true
      #     tags: ${{ steps.meta-auth.outputs.tags }}
      #     labels: ${{ steps.meta-auth.outputs.labels }}
      #     # Cache layers between runs using the registry itself
      #     cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/auth-server:cache
      #     cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/auth-server:cache,mode=max

      # ── Reverse Proxy + Nginx ──────────────────────────────────────────────
      # TODO: Build using docker-bake.hcl
      
  deploy:
    name: Deploy to Server (IPv6)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rename prod compose file for upload
        run: cp docker-compose.prod.yml docker-compose.yml

      # Support IPv6 on GitHub via Cloudflare WARP
      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual
      - name: testing ipv6 for command
        run: |
          curl -m 9 --ipv6 --verbose https://google.com

      - name: Upload docker-compose.yml to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          # fingerprint: ${{ secrets.DEPLOY_FINGERPRINT }}
          protocol: tcp6
          source: docker-compose.yml
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Pull images and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          # fingerprint: ${{ secrets.DEPLOY_FINGERPRINT }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans